<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetFlow - Acceso</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--grad-surface);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-heavy);
            border: 1px solid var(--glass-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 50px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 96, 144, 0.1);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .hidden {
            display: none;
        }

        /* Error/Success messages */
        #message-box {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .success {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html"><img src="logo.svg" alt="VetFlow"></a>
                <h2 id="auth-title">Iniciar Sesión</h2>
                <p id="auth-subtitle" style="color: var(--text-muted); font-size: 0.9rem;">Bienvenido de nuevo</p>
            </div>

            <div id="message-box" class="hidden"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Ingresar <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label>Nombre del Negocio</label>
                    <input type="text" id="reg-nombre" placeholder="Ej: Veterinaria San Roque" required>
                </div>
                <div class="form-group">
                    <label>Tipo de Negocio</label>
                    <select id="reg-tipo" required>
                        <option value="veterinaria">Veterinaria</option>
                        <option value="tienda">Tienda de Mascotas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Crear Cuenta <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-toggle">
                <span id="toggle-text">¿No tenés cuenta?</span>
                <a href="#" id="toggle-link">Registrate gratis</a>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/auth.js"></script>
    <script>
        const toggleLink = document.getElementById('toggle-link');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleText = document.getElementById('toggle-text');

        // Manejo de hashes (#login, #registro)
        function handleHash() {
            const hash = window.location.hash;
            if (hash === '#registro') {
                showRegister();
            } else {
                showLogin();
            }
        }

        function showRegister() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            authTitle.innerText = "Empezar Prueba Gratis";
            authSubtitle.innerText = "14 días de acceso total — sin tarjeta";
            toggleText.innerText = "¿Ya tenés cuenta?";
            toggleLink.innerText = "Iniciá sesión";
            window.location.hash = 'registro';
        }

        function showLogin() {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            authTitle.innerText = "Iniciar Sesión";
            authSubtitle.innerText = "Bienvenido de nuevo";
            toggleText.innerText = "¿No tenés cuenta?";
            toggleLink.innerText = "Registrate gratis";
            window.location.hash = 'login';
        }

        toggleLink.onclick = (e) => {
            e.preventDefault();
            if (loginForm.classList.contains('hidden')) {
                showLogin();
            } else {
                showRegister();
            }
        };

        window.onload = handleHash;
        window.onhashchange = handleHash;
    </script>
</body>

</html>
