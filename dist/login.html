        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--grad-surface);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-heavy);
            border: 1px solid var(--glass-border);
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 15px;
            }
            .auth-card {
                padding: 25px 20px;
                border-radius: 16px;
            }
        }


        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 50px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 96, 144, 0.1);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .hidden {
            display: none;
        }

        /* Error/Success messages */
        #message-box {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .success {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* Password Visibility Toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: var(--transition);
        }

        .password-toggle:hover {
            color: var(--primary);
        }
    </style>

            </div>

    <!-- Logic -->
    <script>
        const toggleLink = document.getElementById('toggle-link');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleText = document.getElementById('toggle-text');

        // Manejo de hashes (#login, #registro)
        function handleHash() {
            const hash = window.location.hash;
            if (hash === '#registro') {
                showRegister();
            } else {
                showLogin();
            }
        }

        function showRegister() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            authTitle.innerText = "Empezar Prueba Gratis";
            authSubtitle.innerText = "14 días de acceso total — sin tarjeta";
            toggleText.innerText = "¿Ya tenés cuenta?";
            toggleLink.innerText = "Iniciá sesión";
            window.location.hash = 'registro';
        }

        function showLogin() {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            authTitle.innerText = "Iniciar Sesión";
            authSubtitle.innerText = "Bienvenido de nuevo";
            toggleText.innerText = "¿No tenés cuenta?";
            toggleLink.innerText = "Registrate gratis";
            window.location.hash = 'login';
        }

        toggleLink.onclick = (e) => {
            e.preventDefault();
            if (loginForm.classList.contains('hidden')) {
                showLogin();
            } else {
                showRegister();
            }
        };

        window.onload = handleHash;
        window.onhashchange = handleHash;

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
