<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Clientes y Mascotas - VetFlow 2.0</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/clients.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="layout-wrapper">
        <div id="app-content">
            <div class="clients-container">
                <!-- Sidebar: Listado de Clientes -->
                <aside class="clients-list-panel">
                    <div class="panel-header">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3>Clientes</h3>
                            <button class="btn btn-primary btn-sm" id="btn-nuevo-cliente">
                                <i class="fas fa-plus"></i> Nuevo
                            </button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-input" placeholder="Buscar por nombre o DNI...">
                        </div>
                    </div>
                    <div id="clients-scroll" class="clients-scroll">
                        <!-- Clientes via JS -->
                    </div>
                </aside>

                <!-- Detalle del Cliente y Mascotas -->
                <main class="client-detail-panel">
                    <div id="empty-view" class="empty-view">
                        <i class="fas fa-user-circle"></i>
                        <p>Seleccioná un cliente para ver sus mascotas y detalles.</p>
                    </div>

                    <div id="detail-view" class="detail-view">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div id="client-info">
                                <h1 id="det-nombre">Nombre Apellido</h1>
                                <p id="det-dni"><i class="fas fa-id-card"></i> DNI: -</p>
                                <p id="det-contacto"><i class="fas fa-phone"></i> - | <i class="fas fa-envelope"></i> -
                                </p>
                            </div>
                            <button class="btn btn-outline btn-sm" id="btn-editar-cliente">
                                <i class="fas fa-edit"></i> Editar Cliente
                            </button>
                        </div>

                        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #f1f5f9;">

                        <section class="pets-section">
                            <div class="section-header">
                                <h3><i class="fas fa-paw"></i> Mascotas</h3>
                                <button class="btn btn-primary btn-sm" id="btn-nueva-mascota">
                                    <i class="fas fa-plus"></i> Nueva Mascota
                                </button>
                            </div>
                            <div id="pets-grid" class="pets-grid">
                                <!-- Mascotas via JS -->
                            </div>
                        </section>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Modal: Formulario Cliente -->
    <div id="modal-cliente" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-cliente-title">Nuevo Cliente</h2>
                <button class="btn-close" onclick="closeModal('modal-cliente')"><i class="fas fa-times"></i></button>
            </div>
            <form id="form-cliente">
                <input type="hidden" id="client-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="cli-nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="cli-apellido" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="cli-dni">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="cli-telefono">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="cli-email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="cli-direccion">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn btn-outline"
                        onclick="closeModal('modal-cliente')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Formulario Mascota -->
    <div id="modal-mascota" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-mascota-title">Nueva Mascota</h2>
                <button class="btn-close" onclick="closeModal('modal-mascota')"><i class="fas fa-times"></i></button>
            </div>
            <form id="form-mascota">
                <input type="hidden" id="pet-id">
                <div class="form-group">
                    <label>Nombre de la Mascota</label>
                    <input type="text" id="pet-nombre" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Especie</label>
                        <select id="pet-especie" required>
                            <option value="Perro">Perro</option>
                            <option value="Gato">Gato</option>
                            <option value="Ave">Ave</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Raza</label>
                        <input type="text" id="pet-raza">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de Nac.</label>
                        <input type="date" id="pet-nacimiento">
                    </div>
                    <div class="form-group">
                        <label>Sexo</label>
                        <select id="pet-sexo">
                            <option value="M">Macho</option>
                            <option value="F">Hembra</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Color / Señas particulares</label>
                    <input type="text" id="pet-color">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;"><i class="fas fa-save"></i> Guardar Mascota</button>
                    <button type="button" class="btn btn-outline"
                        onclick="closeModal('modal-mascota')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/clients.js"></script>
</body>

</html>
